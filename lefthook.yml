# Lefthook config — runs locally on git events. See https://lefthook.dev
#
# Hooks installed via `bun run prepare` (runs lefthook install).
# Skip a hook for a single commit with: LEFTHOOK=0 git commit
# Or per-hook: lefthook run pre-commit --no-tty (etc.)

pre-commit:
  parallel: true
  commands:
    biome-check:
      # Keep this glob in sync with what CI's `biome check .` actually lints —
      # svg slipped through here once (a11y rules apply to standalone SVGs).
      glob: '*.{js,ts,jsx,tsx,json,jsonc,css,svg}'
      run: bunx biome check --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
    gitleaks:
      run: scripts/gitleaks.sh git --staged --redact --no-banner

pre-merge-commit:
  commands:
    guard-main-merge:
      run: scripts/guard-main-merge.sh

pre-push:
  commands:
    typecheck:
      run: bun --filter '*' typecheck
    lint:
      # Full lint (whole-tree Biome + Next ESLint) gates pushes to main —
      # the same command CI runs, so main can't fail CI on lint. Branch and
      # worktree pushes skip it (CI is the backstop there); decided 2026-07-08
      # after an unlinted README asset landed on main and failed CI.
      only:
        - ref: main
      run: bun run lint
